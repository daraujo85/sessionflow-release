server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Service worker must never be cached by the browser.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # Hashed build assets can be cached aggressively.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: route everything else to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;
}
